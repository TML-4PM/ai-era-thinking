name: Signal Presence Runtime Proof

# Runs the signal-presence-layer mock-sport-event smoke test, captures the
# runtime receipt bundle (execution_receipt.json, runtime-proof.log,
# ledger_receipt.json) as build artifacts, writes a ledger row to
# symbio_audit_log when Supabase secrets are available, and posts an
# issue-bound receipt comment on issue #2.
#
# Triggered by:
#   - push to main affecting signal-presence-layer/**
#   - workflow_dispatch (manual)
#   - schedule every 6 hours (drift detection)
#
# Optional secrets (graceful skip if missing):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE
#
# Built-in:
#   GITHUB_TOKEN (auto-provided; used for issue comment via gh CLI)

on:
  push:
    branches: [main]
    paths:
      - 'signal-presence-layer/**'
      - '.github/workflows/signal-presence-runtime-proof.yml'
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  proof:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signal-presence-layer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (no deps expected)
        run: npm install --no-audit --no-fund

      - name: Run signal-presence smoke test
        id: smoke
        run: |
          set -eo pipefail
          npm test | tee smoke-output.json
          test -f test/runtime/execution_receipt.json
          test -f test/runtime/runtime-proof.log
          test -f test/runtime/ledger_receipt.json
          RECEIPT_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('test/runtime/execution_receipt.json','utf8')).receipt_id)")
          SIGNAL_STATE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('test/runtime/execution_receipt.json','utf8')).output.signal_state)")
          echo "receipt_id=$RECEIPT_ID" >> $GITHUB_OUTPUT
          echo "signal_state=$SIGNAL_STATE" >> $GITHUB_OUTPUT
          echo "::notice::RUNTIME_PASS receipt_id=$RECEIPT_ID signal_state=$SIGNAL_STATE"

      - name: Print runtime-proof log
        run: cat test/runtime/runtime-proof.log

      - name: Print execution receipt
        run: cat test/runtime/execution_receipt.json

      - name: Print ledger receipt
        run: cat test/runtime/ledger_receipt.json

      - name: Upload runtime receipt bundle
        uses: actions/upload-artifact@v4
        with:
          name: signal-presence-runtime-receipt-${{ github.run_id }}
          path: signal-presence-layer/test/runtime/
          if-no-files-found: error
          retention-days: 90

      - name: Write Reality Ledger row (Supabase)
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          RECEIPT_ID: ${{ steps.smoke.outputs.receipt_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -eo pipefail
          PAYLOAD=$(jq -nc \
            --arg actor 'signal-presence-runtime-proof' \
            --arg event_type 'work_completed' \
            --arg task_id 'tml-4pm-ai-era-thinking-issue-2-signal-presence-receipt' \
            --arg receipt_id "$RECEIPT_ID" \
            --arg run_url "$RUN_URL" \
            --arg commit_sha "$COMMIT_SHA" \
            '{actor:$actor, event_type:$event_type, payload:{task_id:$task_id, receipt_id:$receipt_id, run_url:$run_url, commit_sha:$commit_sha, status:"REAL", evidence_type:"ci_workflow_artifact"}}')
          RESP=$(curl -sS -L -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$PAYLOAD" \
            "$SUPABASE_URL/rest/v1/symbio_audit_log")
          echo "ledger_write: $RESP"
          [ -n "$RESP" ] && [ "$RESP" != "null" ] && echo "::notice::LEDGER_PASS"

      - name: Note when ledger secrets missing
        if: ${{ env.SUPABASE_URL == '' || env.SUPABASE_SERVICE_ROLE == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: echo "::warning::Supabase secrets missing in this repo; ledger row not written from CI. Receipt bundle still uploaded as artifact and may be written via bridge from another origin."

      - name: Post receipt to issue #2
        if: ${{ github.event_name != 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECEIPT_ID: ${{ steps.smoke.outputs.receipt_id }}
          SIGNAL_STATE: ${{ steps.smoke.outputs.signal_state }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_NAME: signal-presence-runtime-receipt-${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
        working-directory: ${{ github.workspace }}
        run: |
          set -eo pipefail
          cat > /tmp/issue-comment.md <<EOF
          ## Signal Presence Runtime Receipt

          **status:** REAL  
          **trigger:** \`$EVENT_NAME\` (run #$RUN_NUMBER)  
          **commit:** [\`$COMMIT_SHA\`](https://github.com/$GITHUB_REPOSITORY/commit/$COMMIT_SHA)  
          **workflow run:** $RUN_URL  
          **artifact:** \`$ARTIFACT_NAME\` (90-day retention)  
          **receipt_id:** \`$RECEIPT_ID\`  
          **signal_state:** \`$SIGNAL_STATE\`

          ### Acceptance criteria

          - [x] Runtime proof — \`signal-presence-layer/test/runtime/execution_receipt.json\` generated
          - [x] CI proof — workflow run completed with \`conclusion=success\`
          - [x] Receipt bundle — uploaded as build artifact (\`runtime-proof.log\`, \`execution_receipt.json\`, \`ledger_receipt.json\`)
          - [x] Issue-bound receipt — this comment
          - [ ] Ledger row (Supabase \`symbio_audit_log\`) — written from CI only when \`SUPABASE_URL\`/\`SUPABASE_SERVICE_ROLE\` are installed as repo secrets. Bridge-origin writes may also satisfy this criterion.

          ### Reproduce locally

          \`\`\`bash
          cd signal-presence-layer
          npm test
          \`\`\`

          _Posted automatically by \`.github/workflows/signal-presence-runtime-proof.yml\`_
          EOF
          gh issue comment 2 --repo "$GITHUB_REPOSITORY" --body-file /tmp/issue-comment.md
          echo "::notice::ISSUE_COMMENT_POSTED issue=2"
