name: Self Healing Monitor

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/self-healing-monitor.yml'
      - 'signal-presence-layer/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/self-healing-monitor.yml'
      - 'signal-presence-layer/**'

permissions:
  contents: read
  actions: read

jobs:
  monitor:
    name: Monitor Signal Presence proof state
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect Signal Presence files
        id: inspect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime-receipts

          REQUIRED_FILES=(
            "signal-presence-layer/src/signal-engine.js"
            "signal-presence-layer/src/presence-controller.js"
            "signal-presence-layer/src/execution-bridge.js"
            "signal-presence-layer/src/receipt-logger.js"
            "signal-presence-layer/schemas/signal_event.schema.json"
            "signal-presence-layer/schemas/execution_receipt.schema.json"
          )

          missing=()
          present=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [[ -f "$file" ]]; then
              present+=("$file")
            else
              missing+=("$file")
            fi
          done

          status="PARTIAL"
          if [[ ${#missing[@]} -eq 0 ]]; then
            status="REAL_CANDIDATE"
          fi

          cat > runtime-receipts/self_healing_monitor_receipt.json <<JSON
          {
            "task_id": "self_healing_monitor_${GITHUB_RUN_ID}",
            "intent": "monitor Signal Presence proof state and prevent silent workflow failure",
            "execution": "GitHub Actions inspected required runtime and schema files",
            "output": "runtime-receipts/self_healing_monitor_receipt.json",
            "status": "$status",
            "repository": "${GITHUB_REPOSITORY}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "present_count": ${#present[@]},
            "missing_count": ${#missing[@]},
            "present": $(printf '%s\n' "${present[@]}" | jq -R . | jq -s .),
            "missing": $(printf '%s\n' "${missing[@]}" | jq -R . | jq -s .),
            "score": 0.72
          }
          JSON

          cat runtime-receipts/self_healing_monitor_receipt.json

      - name: Upload receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-monitor-receipt
          path: runtime-receipts/self_healing_monitor_receipt.json
          if-no-files-found: error
